@if(productDetailsData().category){

  <div class="container xl:w[95%]">
<div class="grid sm:grid-cols-12 items-center">
  <div class="col-span-3">
    <div>
        <img class="w-full" [src]="productDetailsData().imageCover" [alt]="productDetailsData().title" [title]="productDetailsData().title">
    </div>
  </div>
  <div class="col-span-3">


<h2 class="text-xl ">{{productDetailsData().title}}</h2>

 <div class="flex flex-wrap justify-between items-center pb-2">

    <i class="fas fa-star text-yellow-500"></i>
   {{productDetailsData().ratingsAverage}}
