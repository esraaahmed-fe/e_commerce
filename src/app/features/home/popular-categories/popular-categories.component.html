
<section class="py-8">
  <div class="container xl:w[95%]">
<h2 class="text-2xl text-center text-purple-600 font-medium ">{{"Shop Popular Categories"|translate}}</h2>
<div class="mt-6">
 <owl-carousel-o [options]="categoriescustomOptions">

    @for (category of categoriesList(); track category._id) {
      <ng-template carouselSlide [id]="category._id">
<div>
       <div>
           <img class="w-full h-72" [src]="category.image" [title]="category.name">
       </div>
         <h3 class="text-base text-purple-600 pt-2">{{category.name}}</h3>
</div>
      </ng-template>
    }

  </owl-carousel-o>
</div>
  </div>
</section>
