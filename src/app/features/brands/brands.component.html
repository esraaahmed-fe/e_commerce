<section class="py-8 ">
  <div class="container xl:w-[95%]">

    <h2 class="text-2xl text-center text-purple-600 font-medium ">{{"Brands"|translate}}</h2>
<div class="parent mt-6 grid gap-3  sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5">
@for(brands of brandsList(); track brands._id ){

<div class="card cursor-pointer">
       <div>
           <img class="w-full h-72" [src]="brands.image" [title]="brands.name">
       </div>

</div>
}
  </div>
   </div>
</section>
