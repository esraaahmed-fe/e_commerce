
<section class="border border-gray-200 shadow-xs rounded bg-gray-200 md:w-1/2 mx-auto my-16 p-4">
  <div class="title">
    <h2 class="mb3 text-purple-600 font-medium  text-center text-3xl">{{"checkOut"|translate}}</h2>
  </div>
  <form [formGroup]="checkOutForm " (ng-submit)="onSubmitCheckOutForm()">

    <div formGroupName="shippingAddress">
       <div class="mb-3">
       <label for="details" class="main-lable" >{{"details"|translate}} </label>
        <textarea formControlName="details" type="text" id="details" class="mb-3 bg-neutral-secondary-medium border border-default-medium text-heading text-sm rounded-base focus:ring-purple-600 focus:border-purple-600 block w-full px-3 py-2.5 shadow-xs placeholder:text-body"  ></textarea>

    </div>
     <div class="mb-3">
        <label for="phone" class="main-lable" >{{"Phone"|translate}}</label>
        <input  formControlName="phone" type="tel" id="phone" class="mb-3 bg-neutral-secondary-medium border border-default-medium text-heading text-sm rounded-base focus:ring-purple-600 focus:border-purple-600 block w-full px-3 py-2.5 shadow-xs placeholder:text-body"  />

    </div>
     <div class="mb-3">
        <label for="city" class="main-lable" >{{"city"|translate}} </label>
        <input  formControlName="city" type="text" id="city" class="mb-3 bg-neutral-secondary-medium border border-default-medium text-heading text-sm rounded-base focus:ring-purple-600 focus:border-purple-600 block w-full px-3 py-2.5 shadow-xs placeholder:text-body"  />

    </div>
    </div>



<div class="flex justify-end">
    <div class="flex flex-wrap justify-end mb-3">
      <button (click)="onSubmitCheckOutForm()"  type="button" class="btn-main px-3">{{"payment with visa"|translate}}

</button>
</div>
    <div class="flex flex-wrap justify-end mb-3">
      <button (click)="onSubmitCheckOutFormCash()"  type="button" class="btn-main px-3">{{"payment with cash"|translate}}

</button>
</div>

</div>

  </form>
</section>
